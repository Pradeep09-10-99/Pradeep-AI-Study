<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polity Quiz - Pradeep AI Study</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* BASE STYLES */
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background:#0f172a; color:white; overflow-x:hidden; }
        
        /* NAVBAR */
        nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 5%; background: rgba(15, 23, 42, 0.85); 
            border-bottom: 1px solid rgba(255,255,255,0.05); position: sticky; top: 0; z-index: 100;
        }
        .back-btn { color: cyan; text-decoration: none; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .back-btn:hover { text-shadow: 0 0 10px cyan; }

        /* HEADER */
        .quiz-header { text-align: center; padding: 40px 5%; background: rgba(0, 252, 254, 0.02); border-bottom: 1px solid rgba(0,255,255,0.1); }
        .quiz-header h1 { font-size: 36px; color: cyan; margin-bottom: 10px; }
        .quiz-header p { color: #cbd5e1; font-size: 16px; }

        /* QUIZ CONTAINER */
        .quiz-container {
            max-width: 700px; margin: 40px auto; background: rgba(255, 255, 255, 0.03); 
            padding: 30px; border-radius: 16px; border: 1px solid rgba(0, 252, 254, 0.2); 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); backdrop-filter: blur(10px);
        }

        .question-text { font-size: 20px; font-weight: 600; margin-bottom: 20px; color: white; }
        
        .option-label {
            display: block; background: rgba(255,255,255,0.05); padding: 15px; 
            border-radius: 10px; margin-bottom: 12px; cursor: pointer; transition: 0.3s;
            border: 1px solid transparent;
        }
        .option-label:hover { background: rgba(0, 252, 254, 0.1); border: 1px solid cyan; }
        .option-label input { margin-right: 15px; cursor: pointer; }

        .btn-submit {
            width: 100%; padding: 15px; background: cyan; color: #0f172a; 
            border: none; border-radius: 10px; font-weight: bold; font-size: 16px; 
            margin-top: 20px; cursor: pointer; transition: 0.3s;
        }
        .btn-submit:hover { box-shadow: 0 0 15px cyan; transform: scale(1.02); }

        /* RESULT SCREEN */
        #result-screen { display: none; text-align: center; }
        #result-screen h2 { font-size: 32px; color: cyan; margin-bottom: 15px; }
        #result-screen p { font-size: 18px; color: #cbd5e1; margin-bottom: 20px; }
        .score-circle {
            width: 120px; height: 120px; border-radius: 50%; border: 5px solid cyan;
            display: flex; justify-content: center; align-items: center; 
            font-size: 35px; font-weight: bold; margin: 0 auto 20px auto; color: white;
            box-shadow: 0 0 20px rgba(0,255,255,0.3);
        }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
    <h3 style="color: white; font-size: 18px;">Pradeep AI Study</h3>
</nav>

<div class="quiz-header">
    <h1><i class="fa-solid fa-scale-balanced"></i> Polity Quiz</h1>
    <p>Indian Constitution & Governance - Test your knowledge!</p>
</div>

<div class="quiz-container" id="quiz-box">
    <!-- Active Quiz Section -->
    <div id="active-quiz">
        <div style="display: flex; justify-content: space-between; margin-bottom: 20px; color: cyan; font-weight: bold;">
            <span id="question-count">Question 1 of 5</span>
            <span><i class="fa-solid fa-stopwatch"></i> Timer: <span id="timer">10:00</span></span>
        </div>

        <h2 class="question-text" id="question">Loading Question...</h2>

        <div id="options-container">
            <!-- Options will be generated by JS -->
        </div>

        <button class="btn-submit" onclick="nextQuestion()" id="next-btn">Next Question <i class="fa-solid fa-arrow-right"></i></button>
    </div>

    <!-- Result Section -->
    <div id="result-screen">
        <h2>Quiz Completed! 🎉</h2>
        <div class="score-circle"><span id="final-score">0</span>/5</div>
        <p id="feedback-msg">Checking your performance...</p>
        <button class="btn-submit" onclick="location.reload()" style="background: transparent; color: cyan; border: 2px solid cyan;">Try Again</button>
        <button class="btn-submit" onclick="location.href='index.html'">Go to Dashboard</button>
    </div>
</div>

<script>
    // Polity Quiz Data
    const quizData = [
        {
            question: "Who is known as the Father of the Indian Constitution?",
            options: ["Jawaharlal Nehru", "Dr. B. R. Ambedkar", "Mahatma Gandhi", "Sardar Vallabhbhai Patel"],
            correct: 1
        },
        {
            question: "How many Fundamental Rights are currently provided by the Indian Constitution?",
            options: ["5", "6", "7", "8"],
            correct: 1
        },
        {
            question: "Which Article of the Indian Constitution deals with the 'Right to Equality'?",
            options: ["Article 14", "Article 19", "Article 21", "Article 32"],
            correct: 0
        },
        {
            question: "The concept of 'Directive Principles of State Policy' (DPSP) was borrowed from which country?",
            options: ["USA", "UK", "Ireland", "USSR"],
            correct: 2
        },
        {
            question: "Who administers the oath of office to the President of India?",
            options: ["Prime Minister", "Chief Justice of India", "Vice President", "Speaker of Lok Sabha"],
            correct: 1
        }
    ];

    let currentQuestion = 0;
    let score = 0;

    const questionEl = document.getElementById("question");
    const optionsContainer = document.getElementById("options-container");
    const qCountEl = document.getElementById("question-count");
    const activeQuiz = document.getElementById("active-quiz");
    const resultScreen = document.getElementById("result-screen");

    function loadQuiz() {
        optionsContainer.innerHTML = "";
        
        let currentQuizData = quizData[currentQuestion];
        questionEl.innerText = currentQuizData.question;
        qCountEl.innerText = `Question ${currentQuestion + 1} of ${quizData.length}`;

        currentQuizData.options.forEach((opt, index) => {
            let label = document.createElement("label");
            label.className = "option-label";
            label.innerHTML = `<input type="radio" name="answer" value="${index}"> ${opt}`;
            optionsContainer.appendChild(label);
        });
    }

    function getSelected() {
        let answerOptions = document.querySelectorAll('input[name="answer"]');
        let selectedValue = undefined;
        answerOptions.forEach(opt => {
            if(opt.checked) {
                selectedValue = parseInt(opt.value);
            }
        });
        return selectedValue;
    }

    function nextQuestion() {
        let answer = getSelected();
        
        if (answer === undefined) {
            alert("Please select an option first!");
            return;
        }

        if (answer === quizData[currentQuestion].correct) {
            score++;
        }

        currentQuestion++;

        if (currentQuestion < quizData.length) {
            loadQuiz();
        } else {
            showResult();
        }
    }

    function showResult() {
        activeQuiz.style.display = "none";
        resultScreen.style.display = "block";
        document.getElementById("final-score").innerText = score;
        
        let feedback = document.getElementById("feedback-msg");
        if(score === quizData.length) {
            feedback.innerText = "Superb! Articles aur Constitution par aapki pakad bahut majboot hai! 🏛️";
        } else if (score >= 3) {
            feedback.innerText = "Achha attempt! Thodi aur polity revise karein toh full marks aayenge. 👍";
        } else {
            feedback.innerText = "Notes library se Polity ke PDF padhein aur fir se try karein. Aap kar sakte hain! 📚";
        }
    }

    loadQuiz();

    // Timer Logic (10 minutes)
    let time = 600; 
    setInterval(() => {
        let min = Math.floor(time / 60);
        let sec = time % 60;
        document.getElementById("timer").innerText = `${min}:${sec < 10 ? '0' : ''}${sec}`;
        if(time > 0) time--;
    }, 1000);
</script>

</body>
</html>
