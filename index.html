<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pradeep AI Study</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* [Keeping your original styles here] */
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial, sans-serif;scroll-behavior:smooth;}
        body{background:#0f172a;color:white;overflow-x:hidden;transition: 0.3s;}
        .bg-animation{position:fixed;width:100%;height:100%;top:0;left:0;z-index:-1;overflow:hidden;}
        .bg-animation span{position:absolute;display:block;width:20px;height:20px;background:rgba(0,255,255,0.2);animation:move 25s linear infinite;bottom:-150px;border-radius:50%;}
        @keyframes move{0%{transform:translateY(0) rotate(0deg);opacity:1;}100%{transform:translateY(-1000px) rotate(720deg);opacity:0;}}
        /* Animation delays */
        .bg-animation span:nth-child(1){left:10%; animation-duration:15s;}
        .bg-animation span:nth-child(2){left:20%; animation-duration:22s; width:30px; height:30px;}
        .bg-animation span:nth-child(3){left:35%; animation-duration:18s;}
        .bg-animation span:nth-child(4){left:50%; animation-duration:26s; width:40px; height:40px;}
        /* Navbar & Hero */
        nav{display:flex;justify-content:space-between;align-items:center;padding:20px 8%;background:rgba(17,24,39,0.8);backdrop-filter:blur(10px);position:sticky;top:0;z-index:1000;}
        .logo{font-size:32px;font-weight:bold;color:cyan;}
        nav ul{display:flex;list-style:none;gap:30px;}
        nav ul li a{text-decoration:none;color:white;font-size:18px;transition:0.3s;}
        nav ul li a:hover{color:cyan;}
        .hero{height:100vh;display:flex;justify-content:center;align-items:center;text-align:center;padding:20px;}
        .hero-content h1{font-size:70px;margin-bottom:20px;}
        .hero-content h2{font-size:35px;color:cyan;margin-bottom:20px;height:45px;}
        /* Login Box Fixes */
        .login-box{max-width:500px;margin:auto;background:rgba(255,255,255,0.08);padding:40px;border-radius:20px;backdrop-filter:blur(10px);text-align:center;}
        .login-box input{width:100%;padding:15px;margin-bottom:15px;border:none;border-radius:10px;outline:none;}
        .btn-group{display: flex; gap: 10px; flex-wrap: wrap;}
        .login-box button{flex: 1; padding:15px; background:cyan; border:none; border-radius:10px; font-weight:bold; cursor:pointer; transition: 0.3s;}
        .login-box button:hover{opacity: 0.8;}
        .logout-btn{background: #ff4757 !important; color: white; margin-top: 10px; width: 100%;}
        /* Mode Toggle */
        .mode-btn{position:fixed;right:20px;bottom:20px;background:cyan;color:black;border:none;padding:15px;border-radius:50%;cursor:pointer;z-index:1001;}
        .light-mode{background: #f1f5f9; color: #1e293b;}
        .light-mode .feature-card, .light-mode .login-box{background: rgba(0,0,0,0.05); color: #1e293b;}
        
        /* Mobile */
        @media(max-width:768px){ .hero-content h1{font-size:40px;} nav ul{display:none;} }
    </style>
</head>
<body id="mainBody">

<div class="bg-animation">
    <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
</div>

<nav>
    <div class="logo">Pradeep AI Study</div>
    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#features">Features</a></li>
        <li><a href="#login">Login</a></li>
        <li><a href="#youtube">Videos</a></li>
    </ul>
</nav>

<section class="hero">
    <div class="hero-content">
        <h1>Pradeep AI Study</h1>
        <h2 id="typing"></h2>
        <p>Learn AI, Coding, Web Development, and NTPC Preparation.</p>
    </div>
</section>

<!-- FIX: Integrated Login System -->
<section class="login" id="login">
    <div class="login-box">
        <h2 style="color:cyan; margin-bottom:20px;">Student Portal</h2>
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="password" placeholder="Password">
        <div class="btn-group">
            <button onclick="signup()">Signup</button>
            <button onclick="login()">Login</button>
        </div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
</section>

<!-- ... (Rest of sections: Features, YouTube, Contact) ... -->

<footer>
    <h3>© 2026 Pradeep AI Study | All Rights Reserved</h3>
</footer>

<button class="mode-btn" onclick="toggleMode()">☀</button>

<script>
    /* Typing Effect */
    const text = ["Learn Coding", "Learn AI", "Build Websites", "NTPC Prep"];
    let count = 0, index = 0;
    function type(){
        if(count === text.length) count = 0;
        let currentText = text[count];
        let letter = currentText.slice(0, ++index);
        document.getElementById('typing').textContent = letter;
        if(letter.length === currentText.length){ count++; index = 0; setTimeout(type, 2000); }
        else { setTimeout(type, 120); }
    }
    type();

    function toggleMode(){ document.body.classList.toggle('light-mode'); }
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } 
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAWhwjfy21WmroQ0P_McbT45Om1eDD8qL4",
        authDomain: "pradeep-ai-study.firebaseapp.com",
        projectId: "pradeep-ai-study",
        storageBucket: "pradeep-ai-study.firebasestorage.app",
        messagingSenderId: "688622064792",
        appId: "1:688622064792:web:75daa8c6cf11638beeeced"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Globalizing functions so buttons can find them
    window.signup = () => {
        const email = document.getElementById("email").value;
        const pass = document.getElementById("password").value;
        createUserWithEmailAndPassword(auth, email, pass)
            .then(() => alert("Account Created!"))
            .catch((err) => alert(err.message));
    };

    window.login = () => {
        const email = document.getElementById("email").value;
        const pass = document.getElementById("password").value;
        signInWithEmailAndPassword(auth, email, pass)
            .then(() => alert("Logged In Successfully!"))
            .catch((err) => alert(err.message));
    };

    window.logout = () => {
        signOut(auth).then(() => alert("Logged Out!"));
    };
</script>
</body>
</html>
