<section class="quiz">

<h1>Online Quiz</h1>

<div class="box">

<h2>
1. HTML stands for?
</h2>

<input type="radio"
name="q1"
value="a">

Hyper Text Markup Language

<br><br>

<input type="radio"
name="q1"
value="b">

High Transfer Machine Language

<br><br>

<button onclick="checkQuiz()">
Submit
</button>

<h2 id="result"></h2>

<script>

function checkQuiz(){

let ans =
document.querySelector(
'input[name="q1"]:checked'
);

if(ans == null){

document.getElementById("result")
.innerHTML =
"Please select an answer.";

}

else if(ans.value == "a"){

document.getElementById("result")
.innerHTML =
"Correct Answer 🎉";

}

else{

document.getElementById("result")
.innerHTML =
"Wrong Answer ❌";

}

}

</script>
