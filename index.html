<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pradeep AI Study</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
    text-align:center;
}

header{
    padding:20px;
    background:#1e293b;
    font-size:32px;
    font-weight:bold;
}

.container{
    padding:30px;
}

.box{
    background:#1e293b;
    margin:20px auto;
    padding:20px;
    border-radius:15px;
    width:80%;
    max-width:700px;
}

input{
    width:80%;
    padding:12px;
    border:none;
    border-radius:10px;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#38bdf8;
    color:white;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#0ea5e9;
}

</style>
</head>

<body>

<header>
🚀 Pradeep AI Study
</header>

<div class="container">

<div class="box">
<h2>🤖 AI Chatbot</h2>

<input type="text" placeholder="Ask your question...">
<br>
<button>Send</button>

<p>AI response will appear here...</p>
</div>

<div class="box">
<h2>📝 Notes Section</h2>
<p>Study notes coming soon...</p>
</div>

<div class="box">
<h2>❓ MCQ Practice</h2>

<p>2 + 2 = ?</p>

<button>4</button>
<button>5</button>

</div>

</div>

</body>
</html>
